<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página não encontrada | ResolveAí</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .err-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-8);
      text-align: center;
    }
    .err-code {
      font-family: var(--font-display);
      font-size: 4rem;
      color: var(--color-primary-light);
      line-height: 1;
      margin-bottom: var(--space-4);
    }
    .err-page h1 { margin-bottom: var(--space-3); }
    .err-page p { color: var(--color-text-muted); max-width: 420px; margin: 0 auto var(--space-8); }
    .err-actions { display: flex; flex-wrap: wrap; gap: var(--space-3); justify-content: center; }
  </style>
</head>
<body>
  <main class="err-page">
    <div>
      <p class="err-code" aria-hidden="true">404</p>
      <h1>Página não encontrada</h1>
      <p>Essa URL não existe no ResolveAí. Volte para a Home e peça ajuda urgente em São Paulo.</p>
      <div class="err-actions">
        <a href="ajuda.html" class="btn btn--primary btn--lg">Assistente ResolveAí</a>
        <a href="index.html" class="btn btn--secondary btn--lg">Ir para a Home</a>
      </div>
    </div>
  </main>
</body>
</html>
